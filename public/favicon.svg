<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0a0a0a"/>
  
  <!-- V Letter with Tech Style -->
  <path d="M 25 25 L 40 65 L 50 45 L 60 65 L 75 25" 
        stroke="url(#grad)" 
        stroke-width="6" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Tech Accent Lines -->
  <line x1="20" y1="75" x2="80" y2="75" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="30" cy="75" r="2" fill="#3b82f6"/>
  <circle cx="50" cy="75" r="2" fill="#8b5cf6"/>
  <circle cx="70" cy="75" r="2" fill="#3b82f6"/>
</svg>
